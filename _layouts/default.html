<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

{% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    <style>
      .screenshot-grid img { cursor: pointer; transition: opacity 0.2s; }
      .screenshot-grid img:hover { opacity: 0.8; }
      .lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
      .lightbox-overlay.active { display: flex; }
      .lightbox-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
    </style>
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="page-header" role="banner">
      <h1 class="project-name">{{ page.title | default: site.title | default: site.github.repository_name }}</h1>
      <h2 class="project-tagline">{{ page.description | default: site.description | default: site.github.project_tagline }}</h2>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-credits">© 2026 MiDaSoft · <a href="mailto:support@midasoft.kr">support@midasoft.kr</a></span>
      </footer>
    </main>
    <div class="lightbox-overlay" id="lightbox" onclick="this.classList.remove('active')">
      <img id="lightbox-img" src="" alt="">
    </div>
    <script>
      document.querySelectorAll('.screenshot-grid img').forEach(function(img) {
        img.addEventListener('click', function() {
          document.getElementById('lightbox-img').src = this.src;
          document.getElementById('lightbox').classList.add('active');
        });
      });
    </script>
  </body>
</html>
